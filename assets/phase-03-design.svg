<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4EBDC"/>
      <stop offset="100%" stop-color="#EFE5D2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg3)"/>
  <text x="40" y="44" font-family="ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#A87648">PHASE 03 · DESIGN — UI / UX</text>

  <!-- Design canvas (browser-style frame) -->
  <g transform="translate(80 90)">
    <rect x="0" y="0" width="640" height="380" rx="10" fill="#FFFFFF" stroke="#1A1815" stroke-width="1.4"/>
    <!-- Top toolbar -->
    <rect x="0" y="0" width="640" height="38" rx="10" fill="#F4EBDC"/>
    <rect x="0" y="22" width="640" height="16" fill="#F4EBDC"/>
    <circle cx="22" cy="19" r="6" fill="#FF5F57"/>
    <circle cx="42" cy="19" r="6" fill="#FEBC2E"/>
    <circle cx="62" cy="19" r="6" fill="#28C840"/>
    <text x="320" y="24" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#6E665B">Hero · Frame 04 · 1440×900</text>
    <line x1="0" y1="38" x2="640" y2="38" stroke="#1A1815" stroke-width="1" opacity="0.2"/>

    <!-- Type sample -->
    <text x="34" y="110" font-family="Fraunces, Georgia, serif" font-size="64" font-weight="350" fill="#1A1815">Refined.</text>
    <text x="34" y="158" font-family="Fraunces, Georgia, serif" font-size="64" font-style="italic" font-weight="350" fill="#A87648">Considered.</text>

    <text x="34" y="200" font-family="Inter, sans-serif" font-size="13" fill="#6E665B">Ipsum lorem · subhead · refined typography</text>

    <!-- CTA button -->
    <rect x="34" y="222" width="140" height="40" rx="20" fill="#1A1815"/>
    <text x="104" y="247" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#FFFFFF" letter-spacing="2">VIEW WORK →</text>

    <!-- Color swatches -->
    <text x="34" y="306" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2" fill="#6E665B">PALETTE</text>
    <g>
      <rect x="34" y="318" width="46" height="46" rx="6" fill="#1A1815"/>
      <rect x="86" y="318" width="46" height="46" rx="6" fill="#A87648"/>
      <rect x="138" y="318" width="46" height="46" rx="6" fill="#F4EBDC" stroke="#1A1815" stroke-width="1"/>
      <rect x="190" y="318" width="46" height="46" rx="6" fill="#3F5246"/>
      <rect x="242" y="318" width="46" height="46" rx="6" fill="#E8D5BB"/>
    </g>

    <!-- Right panel: type ladder -->
    <g transform="translate(360 70)">
      <text font-family="ui-monospace, monospace" font-size="10" letter-spacing="2" fill="#6E665B">TYPE SCALE</text>
      <text x="0" y="32" font-family="Fraunces, serif" font-size="34" font-weight="350" fill="#1A1815">Aa Bb Cc</text>
      <text x="0" y="64" font-family="Fraunces, serif" font-size="22" font-weight="350" fill="#1A1815">The quick brown fox</text>
      <text x="0" y="92" font-family="Inter, sans-serif" font-size="14" fill="#1A1815">jumps over the lazy dog.</text>
      <text x="0" y="116" font-family="Inter, sans-serif" font-size="11" fill="#6E665B">Body · Inter · 14 / 1.55</text>

      <!-- Spacing markers -->
      <g transform="translate(0 150)" stroke="#A87648" stroke-width="1">
        <line x1="0" y1="0" x2="240" y2="0"/>
        <line x1="0" y1="-3" x2="0" y2="3"/>
        <line x1="240" y1="-3" x2="240" y2="3"/>
        <text x="120" y="-8" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#A87648">96px</text>
      </g>

      <!-- Component tiles -->
      <g transform="translate(0 175)">
        <rect x="0" y="0" width="60" height="60" rx="8" fill="#F4EBDC" stroke="#1A1815" stroke-width="1"/>
        <rect x="72" y="0" width="60" height="60" rx="8" fill="#F4EBDC" stroke="#1A1815" stroke-width="1"/>
        <rect x="144" y="0" width="60" height="60" rx="8" fill="#F4EBDC" stroke="#1A1815" stroke-width="1"/>
        <text x="30" y="36" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#A87648">{ }</text>
        <text x="102" y="36" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#A87648">⊞</text>
        <text x="174" y="36" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#A87648">◉</text>
      </g>
    </g>
  </g>

  <!-- Caption -->
  <text x="40" y="540" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2" fill="#6E665B">FIGMA · 12 FRAMES · 4 BREAKPOINTS · 1 DESIGN SYSTEM</text>
</svg>
