<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="orBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF4E8"/>
      <stop offset="100%" stop-color="#F0E6D0"/>
    </linearGradient>
    <radialGradient id="orWarm" cx="20%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#F8E8C8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F8E8C8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orVignette" cx="50%" cy="50%" r="80%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.10"/>
    </radialGradient>
    <linearGradient id="orProcedure" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0D8B8"/>
      <stop offset="100%" stop-color="#D4A688"/>
    </linearGradient>
  </defs>

  <!-- Cream background -->
  <rect width="1400" height="900" fill="url(#orBg)"/>
  <rect width="1400" height="900" fill="url(#orWarm)"/>

  <!-- Subtle dental procedure photo hint (right 60%) -->
  <g opacity="0.85">
    <rect x="560" y="0" width="840" height="900" fill="url(#orProcedure)"/>
    <!-- Lip / teeth abstract -->
    <ellipse cx="1000" cy="450" rx="320" ry="100" fill="#E8B89A"/>
    <ellipse cx="1000" cy="450" rx="200" ry="50" fill="#FFFFFF"/>
    <!-- Tooth shapes -->
    <g fill="#FFFFFF" stroke="#E8D8B8" stroke-width="1">
      <rect x="880" y="430" width="36" height="48" rx="6"/>
      <rect x="918" y="425" width="36" height="55" rx="6"/>
      <rect x="956" y="424" width="40" height="58" rx="6"/>
      <rect x="998" y="425" width="40" height="56" rx="6"/>
      <rect x="1040" y="430" width="36" height="48" rx="6"/>
      <rect x="1078" y="438" width="32" height="40" rx="6"/>
    </g>
    <!-- Dental mirror tool -->
    <g transform="translate(820 380) rotate(-30)">
      <rect x="0" y="0" width="180" height="6" fill="#C8C8C8"/>
      <circle cx="-10" cy="3" r="28" fill="#E8E8E8" stroke="#9A9A9A" stroke-width="1.5"/>
      <circle cx="-10" cy="3" r="22" fill="#FFFFFF"/>
    </g>
    <!-- Probe tool -->
    <g transform="translate(900 540) rotate(15)">
      <rect x="0" y="0" width="160" height="5" fill="#C8C8C8"/>
      <path d="M 160 2.5 L 200 -8 L 198 0 L 200 8 Z" fill="#9A9A9A"/>
    </g>
  </g>
  <!-- Soft fade to cream on left -->
  <linearGradient id="orFade" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#FAF4E8" stop-opacity="1"/>
    <stop offset="40%" stop-color="#FAF4E8" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="#FAF4E8" stop-opacity="0"/>
  </linearGradient>
  <rect x="0" y="0" width="900" height="900" fill="url(#orFade)"/>

  <!-- Top-left brand -->
  <g transform="translate(80 60)">
    <!-- Pin icon -->
    <g transform="translate(0 -2)">
      <path d="M 18 0 a 18 18 0 0 0 -18 18 c 0 14 18 30 18 30 s 18 -16 18 -30 a 18 18 0 0 0 -18 -18 z" fill="none" stroke="#A87E20" stroke-width="2"/>
      <circle cx="18" cy="18" r="6" fill="#A87E20"/>
    </g>
    <text x="56" y="36" font-family="Fraunces, Georgia, serif" font-size="34" font-weight="380" letter-spacing="8" fill="#1A1815">ORIVA</text>
  </g>

  <!-- Top nav -->
  <g font-family="Inter, sans-serif" font-size="13" letter-spacing="3" font-weight="500" fill="#1A1815">
    <text x="500" y="78">ABOUT</text>
    <text x="600" y="78">SERVICES</text>
    <text x="720" y="78">GALLERY</text>
    <text x="830" y="78">JOURNAL</text>
    <text x="940" y="78">CONTACT</text>
  </g>

  <!-- Book appointment pill -->
  <rect x="1080" y="48" width="240" height="48" rx="24" fill="none" stroke="#1A1815" stroke-width="1"/>
  <text x="1200" y="78" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" letter-spacing="2.5" fill="#1A1815" font-weight="500">BOOK APPOINTMENT  →</text>

  <!-- EST tagline -->
  <line x1="80" y1="180" x2="140" y2="180" stroke="#A87E20" stroke-width="1.2"/>
  <text x="156" y="184" font-family="Inter, sans-serif" font-size="11" letter-spacing="6" fill="#A87E20" font-weight="500">EST. 2011 · MUMBAI</text>

  <!-- Hero copy (left side, big) -->
  <g font-family="Fraunces, Georgia, serif" fill="#1A1815">
    <text x="80" y="540" font-size="58" font-weight="350" letter-spacing="-1.5">An atelier of advanced,</text>
    <text x="80" y="610" font-size="58" font-weight="350" letter-spacing="-1.5">painless dentistry —</text>
    <text x="80" y="678" font-size="58" font-style="italic" font-weight="350" letter-spacing="-1.5" fill="#A87E20">where every smile is</text>
    <text x="80" y="748" font-size="58" font-style="italic" font-weight="350" letter-spacing="-1.5" fill="#A87E20">shaped with patience.</text>
  </g>

  <!-- CTA pill -->
  <rect x="80" y="800" width="220" height="60" rx="0" fill="#1A1815"/>
  <text x="190" y="836" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" letter-spacing="2" fill="#FAF4E8" font-weight="500">BOOK CONSULT  →</text>

  <!-- Right-edge vertical socials -->
  <g font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#1A1815" font-weight="500">
    <text x="1370" y="500" transform="rotate(-90 1370 500)">IG</text>
    <text x="1370" y="560" transform="rotate(-90 1370 560)">FB</text>
    <text x="1370" y="620" transform="rotate(-90 1370 620)">IN</text>
  </g>

  <!-- WhatsApp floating button -->
  <circle cx="1310" cy="800" r="32" fill="#26C957"/>
  <text x="1310" y="811" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" fill="#FFFFFF">💬</text>

  <!-- Vignette -->
  <rect width="1400" height="900" fill="url(#orVignette)"/>
</svg>
