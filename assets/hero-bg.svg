<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Multi-tone cream base (subtle vertical+diagonal blend) -->
    <linearGradient id="hbBase" x1="0" y1="0" x2="0.65" y2="1">
      <stop offset="0%"   stop-color="#FBF7EF"/>
      <stop offset="50%"  stop-color="#F1E8D6"/>
      <stop offset="100%" stop-color="#DDCEB2"/>
    </linearGradient>

    <!-- Warm bronze glow, top-right -->
    <radialGradient id="hbGlow1" cx="78%" cy="14%" r="55%">
      <stop offset="0%"   stop-color="#F0D8A8" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#F0D8A8" stop-opacity="0"/>
    </radialGradient>

    <!-- Sage softness, bottom-left -->
    <radialGradient id="hbGlow2" cx="10%" cy="92%" r="55%">
      <stop offset="0%"   stop-color="#DCE3D9" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#DCE3D9" stop-opacity="0"/>
    </radialGradient>

    <!-- Bronze hairline gradient for waves -->
    <linearGradient id="hbWave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#A87648" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#A87648" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#A87648" stop-opacity="0"/>
    </linearGradient>

    <!-- Sage hairline gradient -->
    <linearGradient id="hbWaveS" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3F5246" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#3F5246" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#3F5246" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base layers -->
  <rect width="1920" height="1080" fill="url(#hbBase)"/>
  <rect width="1920" height="1080" fill="url(#hbGlow1)"/>
  <rect width="1920" height="1080" fill="url(#hbGlow2)"/>

  <!-- Decorative orbs (very soft) -->
  <circle cx="1640" cy="220" r="280" fill="#C29063" opacity="0.13"/>
  <circle cx="280"  cy="900" r="340" fill="#3F5246" opacity="0.08"/>
  <circle cx="960"  cy="540" r="180" fill="#E8D5BB" opacity="0.20"/>
  <circle cx="1480" cy="780" r="120" fill="#C29063" opacity="0.10"/>

  <!-- Architectural fluid curves -->
  <g>
    <path d="M -100,300 Q 480,460 960,300 T 2020,360" stroke="url(#hbWaveS)" stroke-width="1.1" fill="none"/>
    <path d="M -100,720 Q 480,560 960,720 T 2020,640" stroke="url(#hbWave)"  stroke-width="1.4" fill="none"/>
    <path d="M -100,820 Q 480,660 960,820 T 2020,740" stroke="url(#hbWave)"  stroke-width="1"   fill="none" opacity="0.65"/>
  </g>

  <!-- Subtle architectural diagonals -->
  <g opacity="0.05" stroke="#1A1815" stroke-width="0.8" fill="none">
    <line x1="0"    y1="920" x2="640"  y2="0"/>
    <line x1="1920" y1="160" x2="1280" y2="1080"/>
    <line x1="0"    y1="160" x2="320"  y2="1080"/>
  </g>

  <!-- Dust particles for depth -->
  <g fill="#A87648" opacity="0.45">
    <circle cx="380"  cy="260" r="1.5"/>
    <circle cx="1340" cy="380" r="1.2"/>
    <circle cx="660"  cy="780" r="1.6"/>
    <circle cx="1740" cy="720" r="1.3"/>
    <circle cx="200"  cy="500" r="1.4"/>
    <circle cx="1100" cy="180" r="1"/>
    <circle cx="780"  cy="980" r="1.5"/>
    <circle cx="1560" cy="980" r="1.3"/>
    <circle cx="540"  cy="160" r="1.1"/>
    <circle cx="1820" cy="540" r="1.4"/>
  </g>

  <!-- Soft top + bottom edge fades for legibility -->
  <linearGradient id="hbFadeT" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#FBF7EF" stop-opacity="0.45"/>
    <stop offset="100%" stop-color="#FBF7EF" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="hbFadeB" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%"   stop-color="#E8DCC4" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#E8DCC4" stop-opacity="0"/>
  </linearGradient>
  <rect width="1920" height="280" fill="url(#hbFadeT)"/>
  <rect y="800" width="1920" height="280" fill="url(#hbFadeB)"/>
</svg>
