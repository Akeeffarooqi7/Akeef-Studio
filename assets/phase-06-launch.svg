<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4EBDC"/>
      <stop offset="100%" stop-color="#E8D5BB"/>
    </linearGradient>
    <linearGradient id="trail" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#A87648" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A87648" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#A87648" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg6)"/>
  <text x="40" y="44" font-family="ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#A87648">PHASE 06 · LAUNCH &amp; CARE</text>

  <!-- Sparkles around -->
  <g fill="#A87648">
    <circle cx="120" cy="160" r="3"/>
    <circle cx="680" cy="120" r="3"/>
    <circle cx="640" cy="280" r="2.5"/>
    <circle cx="160" cy="340" r="2.5"/>
    <circle cx="540" cy="80" r="2"/>
    <circle cx="80" cy="240" r="2"/>
  </g>
  <g stroke="#A87648" stroke-width="1" fill="none">
    <path d="M120 150 L120 170 M110 160 L130 160" />
    <path d="M680 110 L680 130 M670 120 L690 120" />
    <path d="M540 70 L540 90 M530 80 L550 80" />
  </g>

  <!-- Trail under rocket -->
  <path d="M 380 540 L 360 320 L 420 320 L 400 540 Z" fill="url(#trail)" opacity="0.6"/>

  <!-- Rocket body -->
  <g transform="translate(400 280)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="44" ry="80" fill="#FFFFFF" stroke="#1A1815" stroke-width="1.5"/>
    <!-- Window -->
    <circle cx="0" cy="-30" r="16" fill="#A87648"/>
    <circle cx="0" cy="-30" r="11" fill="#F4EBDC"/>
    <circle cx="-3" cy="-33" r="3" fill="#FFFFFF" opacity="0.8"/>
    <!-- Center band -->
    <line x1="-44" y1="20" x2="44" y2="20" stroke="#1A1815" stroke-width="1"/>
    <!-- Fins -->
    <path d="M -44 60 L -78 90 L -44 90 Z" fill="#A87648" stroke="#1A1815" stroke-width="1.5"/>
    <path d="M  44 60 L  78 90 L  44 90 Z" fill="#A87648" stroke="#1A1815" stroke-width="1.5"/>
    <!-- Nose -->
    <path d="M -44 -60 Q 0 -130 44 -60 Z" fill="#A87648" stroke="#1A1815" stroke-width="1.5"/>
    <!-- Flames -->
    <g transform="translate(0 90)">
      <path d="M -22 0 Q -10 30 0 50 Q 10 30 22 0 Q 0 16 -22 0 Z" fill="#A87648"/>
      <path d="M -12 0 Q -5 22 0 36 Q 5 22 12 0 Q 0 12 -12 0 Z" fill="#F4EBDC"/>
    </g>
  </g>

  <!-- "LIVE" badge -->
  <g transform="translate(560 200)">
    <rect x="0" y="0" width="100" height="40" rx="20" fill="#3F5246"/>
    <circle cx="20" cy="20" r="6" fill="#6BCB77"/>
    <circle cx="20" cy="20" r="6" fill="#6BCB77" opacity="0.4">
      <animate attributeName="r" from="6" to="13" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.5" to="0" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="36" y="26" font-family="ui-monospace, monospace" font-size="12" fill="#FFFFFF" letter-spacing="3">LIVE</text>
  </g>

  <!-- Care plan ribbon -->
  <g transform="translate(80 400)">
    <text font-family="ui-monospace, monospace" font-size="10" letter-spacing="2" fill="#6E665B">ONGOING CARE</text>
    <g font-family="Inter, sans-serif" font-size="13" fill="#1A1815">
      <text x="0" y="28">✓ Uptime &amp; backups</text>
      <text x="0" y="50">✓ Quarterly UX iterations</text>
      <text x="0" y="72">✓ Content + small features</text>
    </g>
  </g>

  <text x="40" y="555" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2" fill="#6E665B">SHIPPED · QUIETLY · ON TIME</text>
</svg>
