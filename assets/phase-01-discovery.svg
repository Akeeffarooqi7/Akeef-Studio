<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4EBDC"/>
      <stop offset="100%" stop-color="#E8DCC4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg1)"/>
  <text x="40" y="44" font-family="ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#A87648">PHASE 01 · DISCOVERY &amp; BRIEF</text>

  <!-- Notebook -->
  <g transform="translate(120 130)">
    <rect x="0" y="0" width="500" height="320" rx="6" fill="#FFFFFF" stroke="#1A1815" stroke-width="1.4" opacity="0.96"/>
    <line x1="250" y1="0" x2="250" y2="320" stroke="#A87648" stroke-width="0.8" stroke-dasharray="4 4"/>

    <!-- Left page lines -->
    <g stroke="#1A1815" stroke-width="1" opacity="0.22">
      <line x1="22" y1="56" x2="226" y2="56"/>
      <line x1="22" y1="92" x2="226" y2="92"/>
      <line x1="22" y1="128" x2="200" y2="128"/>
      <line x1="22" y1="164" x2="226" y2="164"/>
      <line x1="22" y1="200" x2="180" y2="200"/>
      <line x1="22" y1="236" x2="226" y2="236"/>
      <line x1="22" y1="272" x2="160" y2="272"/>
    </g>

    <!-- Right page checklist -->
    <text x="270" y="46" font-family="Inter, sans-serif" font-size="14" fill="#1A1815" font-weight="600">Discovery brief</text>
    <line x1="270" y1="58" x2="350" y2="58" stroke="#A87648" stroke-width="1.5"/>

    <g font-family="Inter, sans-serif" font-size="13" fill="#1A1815">
      <g transform="translate(270 90)">
        <circle cx="7" cy="7" r="7" fill="none" stroke="#A87648" stroke-width="1.5"/>
        <path d="M3.5 7 L6 9.5 L11 4.5" stroke="#A87648" stroke-width="1.5" fill="none"/>
        <text x="22" y="12">Goals + outcomes</text>
      </g>
      <g transform="translate(270 122)">
        <circle cx="7" cy="7" r="7" fill="none" stroke="#A87648" stroke-width="1.5"/>
        <path d="M3.5 7 L6 9.5 L11 4.5" stroke="#A87648" stroke-width="1.5" fill="none"/>
        <text x="22" y="12">Audience + voice</text>
      </g>
      <g transform="translate(270 154)" opacity="0.55">
        <circle cx="7" cy="7" r="7" fill="none" stroke="#1A1815" stroke-width="1"/>
        <text x="22" y="12">Brand soul</text>
      </g>
      <g transform="translate(270 186)" opacity="0.55">
        <circle cx="7" cy="7" r="7" fill="none" stroke="#1A1815" stroke-width="1"/>
        <text x="22" y="12">Success metrics</text>
      </g>
      <g transform="translate(270 218)" opacity="0.55">
        <circle cx="7" cy="7" r="7" fill="none" stroke="#1A1815" stroke-width="1"/>
        <text x="22" y="12">Timeline + scope</text>
      </g>
    </g>
  </g>

  <!-- Pen -->
  <g transform="translate(540 410) rotate(-22)">
    <rect x="0" y="0" width="160" height="14" rx="2" fill="#1A1815"/>
    <rect x="0" y="0" width="32" height="14" rx="2" fill="#A87648"/>
    <polygon points="160,0 184,7 160,14" fill="#1A1815"/>
    <circle cx="184" cy="7" r="1.4" fill="#A87648"/>
  </g>

  <!-- Coffee dot -->
  <g transform="translate(80 470)">
    <circle cx="0" cy="0" r="22" fill="#A87648" opacity="0.18"/>
    <circle cx="0" cy="0" r="14" fill="#FFFFFF" stroke="#1A1815" stroke-width="1.2"/>
  </g>
</svg>
