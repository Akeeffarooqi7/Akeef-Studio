<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EEE8DD"/>
      <stop offset="100%" stop-color="#DCE3D9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg2)"/>
  <text x="40" y="44" font-family="ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#3F5246">PHASE 02 · STRATEGY &amp; ARCHITECTURE</text>

  <!-- Sitemap tree -->
  <g font-family="Inter, sans-serif" font-size="11" fill="#1A1815">
    <!-- Root: Home -->
    <rect x="340" y="120" width="120" height="50" rx="8" fill="#FFFFFF" stroke="#1A1815" stroke-width="1.4"/>
    <text x="400" y="142" text-anchor="middle" font-weight="600" font-size="13">Home</text>
    <text x="400" y="158" text-anchor="middle" font-size="10" fill="#6E665B" letter-spacing="2">/ ROOT</text>

    <!-- Vertical lines from root to second level -->
    <line x1="400" y1="170" x2="400" y2="195" stroke="#3F5246" stroke-width="1.2"/>
    <line x1="160" y1="195" x2="640" y2="195" stroke="#3F5246" stroke-width="1.2"/>
    <line x1="160" y1="195" x2="160" y2="220" stroke="#3F5246" stroke-width="1.2"/>
    <line x1="320" y1="195" x2="320" y2="220" stroke="#3F5246" stroke-width="1.2"/>
    <line x1="480" y1="195" x2="480" y2="220" stroke="#3F5246" stroke-width="1.2"/>
    <line x1="640" y1="195" x2="640" y2="220" stroke="#3F5246" stroke-width="1.2"/>

    <!-- Second level: 4 pages -->
    <g>
      <rect x="100" y="220" width="120" height="42" rx="6" fill="#FFFFFF" stroke="#1A1815" stroke-width="1.2"/>
      <text x="160" y="244" text-anchor="middle">Work</text>
    </g>
    <g>
      <rect x="260" y="220" width="120" height="42" rx="6" fill="#FFFFFF" stroke="#1A1815" stroke-width="1.2"/>
      <text x="320" y="244" text-anchor="middle">About</text>
    </g>
    <g>
      <rect x="420" y="220" width="120" height="42" rx="6" fill="#FFFFFF" stroke="#1A1815" stroke-width="1.2"/>
      <text x="480" y="244" text-anchor="middle">Services</text>
    </g>
    <g>
      <rect x="580" y="220" width="120" height="42" rx="6" fill="#3F5246"/>
      <text x="640" y="244" text-anchor="middle" fill="#FFFFFF">Contact</text>
    </g>

    <!-- Third level lines under Work -->
    <line x1="160" y1="262" x2="160" y2="290" stroke="#3F5246" stroke-width="1" opacity="0.6"/>
    <line x1="120" y1="290" x2="200" y2="290" stroke="#3F5246" stroke-width="1" opacity="0.6"/>
    <line x1="120" y1="290" x2="120" y2="312" stroke="#3F5246" stroke-width="1" opacity="0.6"/>
    <line x1="200" y1="290" x2="200" y2="312" stroke="#3F5246" stroke-width="1" opacity="0.6"/>

    <rect x="80" y="312" width="80" height="32" rx="5" fill="#FFFFFF" stroke="#1A1815" stroke-width="1" opacity="0.7"/>
    <text x="120" y="332" text-anchor="middle" font-size="10">Project A</text>
    <rect x="160" y="312" width="80" height="32" rx="5" fill="#FFFFFF" stroke="#1A1815" stroke-width="1" opacity="0.7"/>
    <text x="200" y="332" text-anchor="middle" font-size="10">Project B</text>

    <!-- Third level under Services -->
    <line x1="480" y1="262" x2="480" y2="290" stroke="#3F5246" stroke-width="1" opacity="0.6"/>
    <line x1="440" y1="290" x2="520" y2="290" stroke="#3F5246" stroke-width="1" opacity="0.6"/>
    <line x1="440" y1="290" x2="440" y2="312" stroke="#3F5246" stroke-width="1" opacity="0.6"/>
    <line x1="520" y1="290" x2="520" y2="312" stroke="#3F5246" stroke-width="1" opacity="0.6"/>

    <rect x="400" y="312" width="80" height="32" rx="5" fill="#FFFFFF" stroke="#1A1815" stroke-width="1" opacity="0.7"/>
    <text x="440" y="332" text-anchor="middle" font-size="10">Pricing</text>
    <rect x="480" y="312" width="80" height="32" rx="5" fill="#FFFFFF" stroke="#1A1815" stroke-width="1" opacity="0.7"/>
    <text x="520" y="332" text-anchor="middle" font-size="10">Process</text>
  </g>

  <!-- Caption + dotted markers -->
  <g font-family="ui-monospace, monospace" font-size="10" letter-spacing="2" fill="#6E665B">
    <text x="40" y="430">SITEMAP · 7 PAGES</text>
    <text x="40" y="450" fill="#3F5246">USER FLOWS · 04</text>
    <text x="40" y="470">TECH STACK · LOCKED</text>
  </g>
  <g stroke="#3F5246" stroke-width="1" stroke-dasharray="3 4" fill="none">
    <circle cx="700" cy="430" r="36"/>
    <circle cx="700" cy="430" r="24"/>
    <circle cx="700" cy="430" r="12"/>
  </g>
  <circle cx="700" cy="430" r="3" fill="#3F5246"/>
</svg>
