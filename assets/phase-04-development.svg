        <text y="242">    <tspan fill="#A87648">&lt;script</tspan> <tspan fill="#E8D5BB">src=</tspan><tspan fill="#3F8C5F">"main.js"</tspan><tspan fill="#A87648">&gt;&lt;/script&gt;</tspan></text>
        <text y="264">  <tspan fill="#A87648">&lt;/body&gt;</tspan></text>
        <text y="286"><tspan fill="#A87648">&lt;/html&gt;</tspan></text>
