        <text y="22"><tspan fill="#A87648">&lt;html</tspan> <tspan fill="#E8D5BB">lang=</tspan><tspan fill="#3F8C5F">"en"</tspan><tspan fill="#A87648">&gt;</tspan></text>
        <text y="44">  <tspan fill="#A87648">&lt;head&gt;</tspan></text>
        <text y="66">    <tspan fill="#A87648">&lt;title&gt;</tspan><tspan fill="#F4EBDC">Akeef · Studio</tspan><tspan fill="#A87648">&lt;/title&gt;</tspan></text>
        <text y="88">    <tspan fill="#A87648">&lt;link</tspan> <tspan fill="#E8D5BB">rel=</tspan><tspan fill="#3F8C5F">"stylesheet"</tspan> <tspan fill="#E8D5BB">href=</tspan><tspan fill="#3F8C5F">"styles.css"</tspan><tspan fill="#A87648">&gt;</tspan></text>
        <text y="110">  <tspan fill="#A87648">&lt;/head&gt;</tspan></text>
        <text y="132">  <tspan fill="#A87648">&lt;body&gt;</tspan></text>
        <text y="154">    <tspan fill="#A87648">&lt;main</tspan> <tspan fill="#E8D5BB">class=</tspan><tspan fill="#3F8C5F">"hero"</tspan><tspan fill="#A87648">&gt;</tspan></text>
        <text y="176">      <tspan fill="#A87648">&lt;h1&gt;</tspan><tspan fill="#F4EBDC">Studio of code, craft.</tspan><tspan fill="#A87648">&lt;/h1&gt;</tspan></text>
        <text y="198">      <tspan fill="#A87648">&lt;p&gt;</tspan><tspan fill="#F4EBDC">Hand-built. Considered.</tspan><tspan fill="#A87648">&lt;/p&gt;</tspan></text>
