<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="phBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEF4F8"/>
    </linearGradient>
    <linearGradient id="phLogo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1FA59E"/>
      <stop offset="100%" stop-color="#1A6FD8"/>
    </linearGradient>
    <linearGradient id="phHead" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F2A48"/>
      <stop offset="50%" stop-color="#1A6FD8"/>
      <stop offset="100%" stop-color="#22C2A8"/>
    </linearGradient>
    <linearGradient id="phCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E7F2FF"/>
      <stop offset="100%" stop-color="#D4E6F8"/>
    </linearGradient>
    <linearGradient id="phAvatar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1FA59E"/>
      <stop offset="100%" stop-color="#1A6FD8"/>
    </linearGradient>
  </defs>

  <!-- Light background -->
  <rect width="1400" height="900" fill="url(#phBg)"/>
  <!-- Faint grid -->
  <g opacity="0.04" stroke="#1A6FD8" stroke-width="1">
    <line x1="0" y1="220" x2="1400" y2="220"/>
    <line x1="0" y1="440" x2="1400" y2="440"/>
    <line x1="0" y1="660" x2="1400" y2="660"/>
    <line x1="350" y1="0" x2="350" y2="900"/>
    <line x1="700" y1="0" x2="700" y2="900"/>
    <line x1="1050" y1="0" x2="1050" y2="900"/>
  </g>
  <!-- Soft circle accents -->
  <circle cx="120" cy="640" r="80" fill="#22C2A8" opacity="0.10"/>
  <circle cx="1280" cy="220" r="100" fill="#1A6FD8" opacity="0.06"/>

  <!-- Logo (heart icon + wordmark) -->
  <g transform="translate(80 60)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="url(#phLogo)"/>
    <path d="M 30,46 C 14,36 10,22 22,16 C 28,13 30,18 30,22 C 30,18 32,13 38,16 C 50,22 46,36 30,46 Z" fill="#FFFFFF"/>
    <line x1="14" y1="48" x2="46" y2="48" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="20" y1="52" x2="40" y2="52" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>

    <text x="74" y="28" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#0F2A48">PhysioCare</text>
    <text x="74" y="48" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#6B7C8C">Heal • Move • Thrive</text>
  </g>

  <!-- Top right nav -->
  <g font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#1A2A3E">
    <rect x="540" y="55" width="76" height="34" rx="8" fill="#E7F2FF"/>
    <text x="578" y="78" text-anchor="middle" fill="#1A6FD8" font-weight="600">Home</text>
    <text x="640" y="78">About</text>
    <text x="710" y="78">Treatments</text>
    <text x="830" y="78">Reviews</text>
    <text x="920" y="78">Contact</text>
  </g>
  <!-- Dark mode toggle -->
  <circle cx="1010" cy="72" r="18" fill="#F0F4F8" stroke="#D4DCE4" stroke-width="1"/>
  <path d="M 1004 72 a 6 6 0 1 0 12 0 a 6 6 0 0 0 -12 0" fill="#1A2A3E"/>
  <!-- Book Now button -->
  <rect x="1060" y="50" width="160" height="44" rx="22" fill="url(#phLogo)"/>
  <text x="1095" y="78" font-family="Inter, sans-serif" font-size="13" fill="#FFFFFF" font-weight="600">📅</text>
  <text x="1130" y="78" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF" font-weight="600">Book Now</text>

  <!-- Trusted badge -->
  <rect x="80" y="210" width="380" height="44" rx="22" fill="#E7F2FF"/>
  <circle cx="106" cy="232" r="10" fill="#1A6FD8"/>
  <text x="102" y="237" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">★</text>
  <text x="128" y="237" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1A6FD8">Trusted by 5000+ Patients Worldwide</text>

  <!-- Hero text -->
  <g font-family="Inter, sans-serif" font-weight="800" font-size="78" letter-spacing="-2">
    <text x="80" y="370" fill="url(#phHead)">Heal Better,</text>
    <text x="80" y="460" fill="#0F2A48">Move Freely,</text>
    <text x="80" y="550" fill="#0F2A48">Live Fully</text>
  </g>

  <!-- Body -->
  <text x="80" y="620" font-family="Inter, sans-serif" font-size="17" fill="#5A6878">Expert physiotherapy care by <tspan font-weight="700" fill="#0F2A48">Dr. Sarah Johnson</tspan> — combining</text>
  <text x="80" y="646" font-family="Inter, sans-serif" font-size="17" fill="#5A6878">evidence-based treatments with compassionate care.</text>

  <!-- CTAs -->
  <rect x="80" y="700" width="240" height="58" rx="29" fill="url(#phLogo)"/>
  <text x="200" y="735" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">📅  Book Appointment</text>

  <rect x="340" y="700" width="240" height="58" rx="29" fill="none" stroke="#1A2A3E" stroke-width="1.5"/>
  <text x="460" y="735" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#1A2A3E">👤  Meet the Doctor</text>

  <!-- Doctor card on the right -->
  <g transform="translate(820 200)">
    <rect x="0" y="40" width="500" height="540" rx="28" fill="url(#phCard)"/>

    <!-- Certified pill -->
    <rect x="-30" y="60" width="220" height="80" rx="20" fill="#FFFFFF"/>
    <rect x="-10" y="80" width="40" height="40" rx="8" fill="#E7F2FF"/>
    <text x="36" y="98" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0F2A48">Certified</text>
    <text x="36" y="120" font-family="Inter, sans-serif" font-size="12" fill="#6B7C8C">Board Certified</text>

    <!-- Doctor avatar -->
    <circle cx="250" cy="240" r="80" fill="url(#phAvatar)"/>
    <!-- Simple doctor icon -->
    <circle cx="250" cy="220" r="22" fill="#FFFFFF"/>
    <path d="M 220 290 Q 250 250 280 290 L 280 310 L 220 310 Z" fill="#FFFFFF"/>
    <line x1="240" y1="232" x2="240" y2="252" stroke="#1A6FD8" stroke-width="2"/>
    <line x1="260" y1="232" x2="260" y2="252" stroke="#1A6FD8" stroke-width="2"/>
    <circle cx="240" cy="256" r="3" fill="#1A6FD8"/>
    <circle cx="260" cy="256" r="3" fill="#1A6FD8"/>

    <!-- Name + role -->
    <text x="250" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#0F2A48">Dr. Sarah Johnson</text>
    <text x="250" y="402" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#5A6878">Senior Physiotherapist &amp;</text>
    <text x="250" y="422" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#5A6878">Sports Rehabilitation Specialist</text>

    <!-- Pills -->
    <rect x="60" y="460" width="200" height="42" rx="21" fill="#FFFFFF"/>
    <text x="80" y="487" font-family="Inter, sans-serif" font-size="13" fill="#1A6FD8" font-weight="600">🎓 PhD Physiotherapy</text>

    <!-- Rating badge -->
    <rect x="280" y="460" width="180" height="80" rx="14" fill="#FFFFFF"/>
    <circle cx="316" cy="500" r="20" fill="#22C2A8"/>
    <text x="316" y="506" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#FFFFFF" font-weight="700">★</text>
    <text x="350" y="496" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#0F2A48">4.9/5</text>
    <text x="350" y="516" font-family="Inter, sans-serif" font-size="11" fill="#6B7C8C">500+ Reviews</text>
  </g>

  <!-- Floating chat + WhatsApp -->
  <circle cx="1310" cy="710" r="32" fill="url(#phLogo)"/>
  <text x="1310" y="717" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" fill="#FFFFFF">🤖</text>
  <circle cx="1326" cy="690" r="10" fill="#FF4D4D"/>
  <text x="1326" y="694" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#FFFFFF" font-weight="700">1</text>
  <circle cx="1310" cy="800" r="32" fill="#26C957"/>
  <text x="1310" y="810" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" fill="#FFFFFF">💬</text>
</svg>
